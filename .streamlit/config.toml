[theme]
base = "dark"
font = "sans-serif"
headingFont = "sans-serif"
baseRadius = "small"
showSidebarBorder = true

[theme.dark]
primaryColor = "#D99A3D"
backgroundColor = "#13161D"
secondaryBackgroundColor = "#1D212B"
textColor = "#E9E7E0"
borderColor = "#2B2F3A"
linkColor = "#D99A3D"

[theme.light]
primaryColor = "#B87B1E"
backgroundColor = "#FAF9F6"
secondaryBackgroundColor = "#F0EEE8"
textColor = "#1C1B18"
borderColor = "#E0DDD3"
linkColor = "#B87B1E"
